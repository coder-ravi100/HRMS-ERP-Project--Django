{% extends 'dashboard/admin_dashboard.html' %}
{% load static %}
{% block meincontaint %}
<!-- [ Main Content ] start -->
<div class="pcoded-main-container">
    <div class="pcoded-wrapper">
        <div class="pcoded-content">
            <div class="pcoded-inner-content">
                <div class="main-body">
                    <div class="page-wrapper">
                        <!-- [ breadcrumb ] start -->
                        <div class="page-header">
                            <div class="page-block">
                                <div class="row align-items-center">
                                    <div class="col-md-12">
                                        <div class="page-header-title">
                                            <h5 class="m-b-10">Sample Page</h5>
                                        </div>
                                        <ul class="breadcrumb">
                                            <li class="breadcrumb-item"><a href="index.html"><i class="feather icon-home"></i></a></li>
                                            <li class="breadcrumb-item"><a href="#!">Sample Page</a></li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- [ breadcrumb ] end -->
                        <!-- [ Main Content ] start -->
                        <div class="row">
                            <!-- [ Inputs Form ] start -->
                            <div class="col-sm-12">
                                <div class="card">
                                    <div class="card-header">
                                        <h5>Create Employee</h5>
                                    </div>
                            
                                    <div class="card-body">
                                        <form method="POST">
                                            {% csrf_token %}
                            
                                            <div class="row">
                            
                                                <!-- Employee ID -->
                                                <div class="col-md-6">
                                                    <div class="form-group">
                                                        <label>Employee ID</label>
                                                        <input type="text" name="employee_id" class="form-control" placeholder="EMP001">
                                                    </div>
                                                </div>
                            
                                                <!-- First Name -->
                                                <div class="col-md-6">
                                                    <div class="form-group">
                                                        <label>First Name</label>
                                                        <input type="text" name="first_name" class="form-control" placeholder="Enter first name">
                                                    </div>
                                                </div>
                            
                                                <!-- Last Name -->
                                                <div class="col-md-6">
                                                    <div class="form-group">
                                                        <label>Last Name</label>
                                                        <input type="text" name="last_name" class="form-control" placeholder="Enter last name">
                                                    </div>
                                                </div>
                            
                                                <!-- Email -->
                                                <div class="col-md-6">
                                                    <div class="form-group">
                                                        <label>Email</label>
                                                        <input type="email" name="email" class="form-control" placeholder="Enter email">
                                                    </div>
                                                </div>
                            
                                                <!-- Phone -->
                                                <div class="col-md-6">
                                                    <div class="form-group">
                                                        <label>Phone</label>
                                                        <input type="text" name="phone" class="form-control" placeholder="Phone number">
                                                    </div>
                                                </div>
                            
                                                <!-- Department -->
                                                <div class="col-md-6">
                                                    <div class="form-group">
                                                        <label>Department</label>
                                                        <select name="department" class="form-control">
                                                            <option value="">Select Department</option>
                                                            <option>HR</option>
                                                            <option>IT</option>
                                                            <option>Finance</option>
                                                            <option>Sales</option>
                                                        </select>
                                                    </div>
                                                </div>
                            
                                                <!-- Designation -->
                                                <div class="col-md-6">
                                                    <div class="form-group">
                                                        <label>Designation</label>
                                                        <input type="text" name="designation" class="form-control" placeholder="Job title">
                                                    </div>
                                                </div>
                            
                                                <!-- Joining Date -->
                                                <div class="col-md-6">
                                                    <div class="form-group">
                                                        <label>Joining Date</label>
                                                        <input type="date" name="joining_date" class="form-control">
                                                    </div>
                                                </div>
                            
                                                <!-- Username -->
                                                <div class="col-md-6">
                                                    <div class="form-group">
                                                        <label>Username</label>
                                                        <input type="text" name="username" class="form-control" placeholder="Login username">
                                                    </div>
                                                </div>
                            
                                                <!-- Password -->
                                                <div class="col-md-6">
                                                    <div class="form-group">
                                                        <label>Password</label>
                                                        <input type="password" name="password" class="form-control" placeholder="Enter password">
                                                    </div>
                                                </div>
                            
                                                <!-- Role -->
                                                <div class="col-md-6">
                                                    <div class="form-group">
                                                        <label>Role</label>
                                                        <select name="role" class="form-control">
                                                            <option value="">Select Role</option>
                                                            <option>Admin</option>
                                                            <option>HR</option>
                                                            <option>Manager</option>
                                                            <option>Employee</option>
                                                        </select>
                                                    </div>
                                                </div>
                            
                                                <!-- Status -->
                                                <div class="col-md-6">
                                                    <div class="form-group">
                                                        <label>Status</label>
                                                        <select name="status" class="form-control">
                                                            <option value="active">Active</option>
                                                            <option value="inactive">Inactive</option>
                                                        </select>
                                                    </div>
                                                </div>
                            
                                            </div>
                            
                                            <button type="submit" class="btn btn-primary">Create Employee</button>
                            
                                        </form>
                                    </div>
                                </div>
                            </div>
                            <!-- [ Input Form ] end -->
                        </div>
                        <!-- [ Main Content ] end -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- [ Main Content ] end -->
{% endblock %}
