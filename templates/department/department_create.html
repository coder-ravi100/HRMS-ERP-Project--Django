{% extends 'dashboard/admin_dashboard.html' %}
{% load static %}
{% block meincontaint %}
<!-- [ Main Content ] start -->
<div class="pcoded-main-container">
    <div class="pcoded-wrapper">
        <div class="pcoded-content">
            <div class="pcoded-inner-content">
                <div class="main-body">
                    <div class="page-wrapper">
                        <!-- [ breadcrumb ] start -->
                        <div class="page-header">
                            <div class="page-block">
                                <div class="row align-items-center">
                                    <div class="col-md-12">
                                        <div class="page-header-title">
                                            <h5 class="m-b-10">Sample Page</h5>
                                        </div>
                                        <ul class="breadcrumb">
                                            <li class="breadcrumb-item"><a href="index.html"><i class="feather icon-home"></i></a></li>
                                            <li class="breadcrumb-item"><a href="#!">Sample Page</a></li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- [ breadcrumb ] end -->
                        <!-- [ Main Content ] start -->
                        <!-- Main Content -->
                        <div class="row">

                            <div class="col-md-12">
                                <div class="card">
                                
                                    <div class="card-header">
                                    <h5>Add Department</h5>
                                    </div>
                                
                                    <div class="card-body">
                                    
                                        <form method="POST">
                                        {% csrf_token %}
                                            
                                            <div class="form-group">
                                            <label>Department Name</label>
                                            <input type="text" name="name" class="form-control" placeholder="Enter department name" required>
                                            </div>
                                        
                                            <div class="form-group">
                                            <label>Description</label>
                                            <textarea name="description" class="form-control" rows="4" placeholder="Enter department description"></textarea>
                                            </div>
                                        
                                            <div class="form-group">
                                            <button type="submit" class="btn btn-primary">Create Department</button>
                                            <a href="#" class="btn btn-secondary">Cancel</a>
                                            </div>
                                        
                                        </form>
                                    
                                    </div>
                                
                                </div>
                            </div>

                        </div>
                            
                        </div>
                        <!-- [ Main Content ] end -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- [ Main Content ] end -->
{% endblock %}
