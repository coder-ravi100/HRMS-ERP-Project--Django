{% extends 'dashboard/Admin_Dashboard.html' %}
{% load static %}
{% block mein %}
<!-- [ Main Content ] start -->
<div class="pcoded-main-container">
    <div class="pcoded-wrapper">
        <div class="pcoded-content">
            <div class="pcoded-inner-content">
                <div class="main-body">
                    <div class="page-wrapper">
                        <!-- [ breadcrumb ] start -->
                        <div class="page-header">
                            <div class="page-block">
                                <div class="row align-items-center">
                                    <div class="col-md-12">
                                        <div class="page-header-title">
                                            <h5 class="m-b-10">Department</h5>
                                        </div>
                                        <ul class="breadcrumb">
                                            <li class="breadcrumb-item"><a href="{% url 'admin-dashboard' %}"><i class="feather icon-home"></i></a></li>
                                            <li class="breadcrumb-item"><a href="">Department Add</a></li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- [ breadcrumb ] end -->
                        <!-- [ Main Content ] start -->
                        <div class="row">
                            <div class="col-sm-12">
                                <div class="card">
                                    <div class="card-header">
                                        <h5>Add Department</h5>
                                    </div>
                            
                                    <div class="card-body">
                            
                                        <form method="POST" action="{% url 'add-department' %}">
                                            {% csrf_token %}
                            
                                            <div class="form-group">
                                                <label>Department Name</label>
                                                <input 
                                                    type="text" 
                                                    name="name" 
                                                    class="form-control" 
                                                    placeholder="Enter department name"
                                                    required
                                                >
                                            </div>
                            
                                            <div class="form-group">
                                                <label>Description</label>
                                                <textarea 
                                                    name="description" 
                                                    class="form-control" 
                                                    rows="4"
                                                    placeholder="Enter department description"
                                                ></textarea>
                                            </div>
                            
                                            <input type="submit" class="btn btn-primary" value="Add Department">
                                            <input type="reset" class="btn btn-secondary" value="Cancel">                            
                                                                        
                                        </form>
                            
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- [ Main Content ] end -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- [ Main Content ] end -->
{% endblock %}
