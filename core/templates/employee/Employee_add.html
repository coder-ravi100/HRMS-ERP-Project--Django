{% extends 'dashboard/Admin_Dashboard.html' %}
{% load static %}
{% block mein %}
<!-- [ Main Content ] start -->
<div class="pcoded-main-container">
    <div class="pcoded-wrapper">
        <div class="pcoded-content">
            <div class="pcoded-inner-content">
                <div class="main-body">
                    <div class="page-wrapper">
                        <!-- [ breadcrumb ] start -->
                        <div class="page-header">
                            <div class="page-block">
                                <div class="row align-items-center">
                                    <div class="col-md-12">
                                        <div class="page-header-title">
                                            <h5 class="m-b-10">Employyee</h5>
                                        </div>
                                        <ul class="breadcrumb">
                                            <li class="breadcrumb-item"><a href="index.html"><i class="feather icon-home"></i></a></li>
                                            <li class="breadcrumb-item"><a href="#!">Add Employee</a></li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- [ breadcrumb ] end -->
                        <!-- [ Main Content ] start -->
                        <div class="row">
                            <!-- [ Create Employee Form ] start -->
                            <div class="col-sm-12">
                                <div class="card">
                                
                                    <div class="card-header">
                                    <h5>Create Employee</h5>
                                    </div>
                                
                                <div class="card-body">
                                
                                    <form method="POST" enctype="multipart/form-data">
                                    {% csrf_token %}
                                    
                                        <div class="row">
                                        
                                            <!-- Username -->
                                            <!-- <div class="col-md-6">
                                                <div class="form-group">
                                                <label>Username</label>
                                                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                                                </div>
                                            </div> -->
                                            
                                            
                                            <!-- First Name -->
                                            <div class="col-md-6">
                                                <div class="form-group">
                                                <label>First name</label>
                                                <input type="text" name="first_name" class="form-control" placeholder="Enter first name" required>
                                                </div>
                                            </div>
                                            
                                            <!-- Last Name -->
                                            <div class="col-md-6">
                                                <div class="form-group">
                                                <label>Last name</label>
                                                <input type="text" name="last_name" class="form-control" placeholder="Enter Last Name" required>
                                                </div>
                                            </div>
                                            
                                            <!-- Email -->
                                            <div class="col-md-6">
                                                <div class="form-group">
                                                <label>Email</label>
                                                <input type="email" name="email" class="form-control" placeholder="Enter email" required>
                                                </div>
                                            </div>

                                            <!--Role-->
                                            <div class="col-md-6">
                                                <label>Role</label>
                                                <select name="role" class="form-control">
                                                    <option value="ADMIN">Admin</option>
                                                    <option value="EMPLOYEE">Employee</option>
                                                </select>
                                            </div>
                                                                                    
                                            <!-- Phone -->
                                            <div class="col-md-6">
                                                <div class="form-group">
                                                <label>Phone</label>
                                                <input type="text" name="phone" class="form-control" placeholder="Enter phone">
                                                </div>
                                            </div>
                                        
                                            <!-- Experience -->
                                            <div class="col-md-6">
                                                <div class="form-group">
                                                <label>Experience (Years)</label>
                                                <input type="number" name="experience" class="form-control">
                                                </div>
                                            </div>

                                             <!-- Profile Photo -->
                                             <div class="col-md-6">
                                                <div class="form-group">
                                                <label>Profile Photo</label>
                                                <input type="file" name="profile_pic" class="form-control">
                                                </div>
                                            </div>

                                            <!-- Address -->
                                            <div class="col-md-12">
                                                <div class="form-group">
                                                <label>Address</label>
                                                <textarea name="address" class="form-control" rows="2"></textarea>
                                                </div>
                                            </div>
                                        
                                            <!-- Department -->
                                            <div class="col-md-6">
                                                <div class="form-group">
                                                <label>Department</label>
                                                <select name="department" class="form-control">
                                                <option value="">Select Department</option>
                                                
                                                {% for d in departments %}
                                                <option value="{{ d.id }}">{{ d.name }}</option>
                                                {% endfor %}
                                                
                                                </select>
                                                </div>
                                            </div>
                                        
                                            <!-- Designation -->
                                            <div class="col-md-6">
                                                <div class="form-group">
                                                <label>Designation</label>
                                                <input type="text" name="designation" class="form-control" placeholder="Enter designation">
                                                </div>
                                            </div>
                                        
                                                                                   
                                            <!-- Salary -->
                                            <div class="col-md-6">
                                                <div class="form-group">
                                                <label>Salary</label>
                                                <input type="number" name="salary" class="form-control">
                                                </div>
                                            </div>
                                        
                                            <!-- Joining Date -->
                                            <div class="col-md-6">
                                                <div class="form-group">
                                                <label>Joining Date</label>
                                                <input type="date" name="join_date" class="form-control">
                                                </div>
                                            </div>
                                                                                                                        
                                        </div>
                                    
                                        <!-- Buttons -->
                                        <div class="form-group mt-3">
                                            <input type="submit" class="btn btn-primary" value="Create Employee">
                                            <input type="reset" class="btn btn-secondary"  value="Cancel">
                                        </div>
                                    
                                    </form>
                                
                                </div>
                                </div>
                            </div>
                            <!-- [ Create Employee Form ] end -->
                        </div>
                        <!-- [ Main Content ] end -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- [ Main Content ] end -->
{% endblock %}
