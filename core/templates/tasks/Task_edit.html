{% extends 'dashboard/Admin_Dashboard.html' %}
{% load static %}
{% block mein %}
<!-- [ Main Content ] start -->
<div class="pcoded-main-container">
    <div class="pcoded-wrapper">
        <div class="pcoded-content">
            <div class="pcoded-inner-content">
                <div class="main-body">
                    <div class="page-wrapper">
                        <!-- [ breadcrumb ] start -->
                        <div class="page-header">
                            <div class="page-block">
                                <div class="row align-items-center">
                                    <div class="col-md-12">
                                        <div class="page-header-title">
                                            <h5 class="m-b-10">Tasks</h5>
                                        </div>
                                        <ul class="breadcrumb">
                                            <li class="breadcrumb-item"><a href="index.html"><i class="feather icon-home"></i></a></li>
                                            <li class="breadcrumb-item"><a href="#!">Edit Tasks</a></li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- [ breadcrumb ] end -->
                        <!-- [ Main Content ] start -->
                        <div class="row">
                           <!-- Add Task -->
                            <div class="col-sm-12">
                                <div class="card">
                                
                                    <div class="card-header">
                                    <h5>Add Task</h5>
                                    </div>
                                
                                    <div class="card-body">
                                
                                        <form method="POST" action="{% url 'task-edit' tasks.id %}">
                                        {% csrf_token %}
                                
                                    <div class="row">
                                
                                        <!-- Task Title -->
                                        <div class="col-md-6">
                                            <div class="form-group">
                                                <label>Task Title</label>
                                                    <input type="text" name="title" class="form-control" placeholder="Enter task title" required value="{{tasks.title}}">
                                            </div>
                                        </div>
                                
                                        <!-- Assign Employee -->
                                        <div class="col-md-6">
                                            <div class="form-group">
                                                <label>Assign Employee</label>
                                
                                                <select name="assigned_to" class="form-control" required>
                                                    <option value="">Select Employee</option>
                                    
                                                    {% for e in employees %}
                                                        <option value="{{ e.id }}"
                                                            {% if tasks.assigned_to.id == e.id %}selected{% endif %}>
                                                            {{ e.first_name }} {{ e.last_name }}
                                                        </option>
                                                    {% endfor %}
                                    
                                                </select>
                                             </div>
                                        </div>
                                
                                        <!-- Due Date -->
                                        <div class="col-md-6">
                                            <div class="form-group">
                                                <label>Due Date</label>
                                                <input type="date" name="due_date" class="form-control" required value="{{tasks.due_date|date:'Y-m-d'}}">
                                            </div>
                                        </div>
                                
                                        <!-- Priority -->
                                        <div class="col-md-6">
                                            <div class="form-group">
                                                <label>Status</label>
                                                
                                                <select name="status" class="form-control">
                                                    <option value="Pending" {% if tasks.status == "Pending" %}selected{% endif %}>Pending</option>
                                                    <option value="In Progress" {% if tasks.status == "In Progress" %}selected{% endif %}>In Progress</option>
                                                    <option value="Completed" {% if tasks.status == "Completed" %}selected{% endif %}>Completed</option>
                                                </select>
                                            
                                            </div>
                                        </div>
                                
                                        <!-- Description -->
                                        <div class="col-md-12">
                                            <div class="form-group">
                                                <label>Description</label>
                                        
                                                    <textarea name="description" class="form-control" rows="4"
                                                    placeholder="Write task details">{{tasks.description}}</textarea>
                                        
                                            </div>
                                        </div>
                                        
                                    </div>
                                
                                <!-- Buttons -->
                                <div class="text-right">
                                <input type="submit" class="btn btn-primary" value="Assign Task">
                                <a href="{% url 'list-task' %}" class="btn btn-secondary">Cancel</a>
                                </div>
                                
                                </form>
                                
                                </div>
                                </div>
                            </div>
                        </div>
                        <!-- [ Main Content ] end -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- [ Main Content ] end -->
{% endblock %}
